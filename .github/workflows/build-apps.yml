name: Build Native Wrappers

on:
  push:
    tags:
      - 'release-windows-*'
      - 'release-android-*'
      - 'release-all-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Electron Windows Wrapper
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK || secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK || secrets.CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: desktop-wrapper
        run: npm ci

      - name: Build Windows artifacts
        working-directory: desktop-wrapper
        run: npm run build

      - name: Verify Windows code signing
        shell: pwsh
        run: |
          $signingConfigured = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK) -or -not [string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)
          if ($signingConfigured) {
            $exes = Get-ChildItem -Path 'desktop-wrapper/dist' -Filter '*.exe' -File
            foreach ($exe in $exes) {
              $signature = Get-AuthenticodeSignature -FilePath $exe.FullName
              if ($signature.Status -ne 'Valid') {
                throw "Expected a valid signed Windows binary, but `$($exe.FullName)` has signature status `$($signature.Status)`."
              }
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-wrapper
          path: |
            desktop-wrapper/dist/YARA-Kids-Setup.exe
            desktop-wrapper/dist/YARA-Kids.windows.manifest.json
          if-no-files-found: error

  build-android:
    name: Build Capacitor Android Wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile-wrapper
        run: npm ci

      - name: Generate Android platform
        working-directory: mobile-wrapper
        run: npx cap add android

      - name: Sync Capacitor Android project
        working-directory: mobile-wrapper
        run: npx cap sync android

      - name: Apply Android version metadata
        working-directory: mobile-wrapper
        run: npm run prepare:android

      - name: Apply site icon to Android launcher icons
        working-directory: mobile-wrapper
        run: npm run apply:site-icon

      - name: Apply Android network security config
        working-directory: mobile-wrapper
        run: npm run security:android || echo "Security config skipped (not critical)"

      - name: Decode Android keystore (if provided)
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > mobile-wrapper/android/app/yarakids-release.keystore
          echo "ANDROID_KEYSTORE_PATH=mobile-wrapper/android/app/yarakids-release.keystore" >> $GITHUB_ENV

      - name: Build Android APK (Release)
        working-directory: mobile-wrapper/android
        run: |
          if [ -n "$ANDROID_KEYSTORE_PATH" ] && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "Signing APK with provided keystore..."
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$ANDROID_KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"
          else
            echo "No keystore provided — building unsigned release APK."
            ./gradlew assembleRelease
          fi

      - name: Locate APK
        shell: bash
        run: |
          SIGNED=$(find mobile-wrapper/android/app/build/outputs/apk/release -name 'app-release.apk' 2>/dev/null | head -1)
          UNSIGNED=$(find mobile-wrapper/android/app/build/outputs/apk/release -name 'app-release-unsigned.apk' 2>/dev/null | head -1)
          APK_PATH="${SIGNED:-$UNSIGNED}"
          if [ -z "$APK_PATH" ]; then
            echo "APK not found in release output — searching broader"
            APK_PATH=$(find mobile-wrapper/android -name '*.apk' 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            ls -la mobile-wrapper/android/app/build/outputs/apk/ 2>/dev/null || true
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK at: $APK_PATH"

      - name: Copy APK to release assets
        run: |
          mkdir -p release-assets/android
          cp "${{ env.APK_PATH }}" "release-assets/android/YARA-Kids.apk"
          echo "APK size: $(stat -c%s 'release-assets/android/YARA-Kids.apk') bytes"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper
          path: release-assets/android/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import json
          with open('desktop-wrapper/package.json', 'r', encoding='utf-8') as fh:
              print(json.load(fh)['version'])
          PY
          )
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-wrapper
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-wrapper
          path: release-assets/android

      - name: Finalize Windows manifest for release
        shell: bash
        env:
          RELEASE_TAG: native-wrapper-build-${{ github.run_number }}
          APP_VERSION: ${{ steps.version.outputs.value }}
          REPOSITORY: ${{ github.repository }}
        run: |
          INSTALLER_URL="https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/YARA-Kids-Setup.exe"
          RELEASE_URL="https://github.com/${REPOSITORY}/releases/tag/${RELEASE_TAG}"
          INSTALLER_PATH="release-assets/windows/YARA-Kids-Setup.exe"
          INSTALLER_SHA256="$(sha256sum "${INSTALLER_PATH}" | awk '{print $1}')"
          INSTALLER_SIZE="$(stat -c%s "${INSTALLER_PATH}")"
          export INSTALLER_URL RELEASE_URL INSTALLER_SHA256 INSTALLER_SIZE
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path('release-assets/windows/YARA-Kids.windows.manifest.json')
          manifest = {}
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding='utf-8'))

          manifest.update({
              'schemaVersion': 1,
              'appId': 'com.yarakids.desktop',
              'productName': 'YARA Kids',
              'channel': 'stable',
              'version': os.environ['APP_VERSION'],
              'publishedAt': manifest.get('publishedAt') or __import__('datetime').datetime.utcnow().replace(microsecond=0).isoformat() + 'Z',
              'releaseUrl': os.environ['RELEASE_URL'],
          })
          manifest['installer'] = {
              'name': 'YARA-Kids-Setup.exe',
              'url': os.environ['INSTALLER_URL'],
              'sha256': os.environ['INSTALLER_SHA256'],
              'size': int(os.environ['INSTALLER_SIZE']),
          }

          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Generate APK checksum
        shell: bash
        run: |
          APK_PATH="release-assets/android/YARA-Kids.apk"
          if [ -f "$APK_PATH" ]; then
            SHA256=$(sha256sum "$APK_PATH" | awk '{print $1}')
            SIZE=$(stat -c%s "$APK_PATH")
            echo "APK SHA256: $SHA256"
            echo "APK Size: $SIZE bytes"
            echo "$SHA256" > "release-assets/android/YARA-Kids.apk.sha256"
          else
            echo "No APK found at $APK_PATH — skipping checksum"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: native-wrapper-build-${{ github.run_number }}
          name: YARA Kids Native Wrappers v${{ steps.version.outputs.value }} (build ${{ github.run_number }})
          generate_release_notes: true
          files: |
            release-assets/windows/YARA-Kids-Setup.exe
            release-assets/windows/YARA-Kids.windows.manifest.json
            release-assets/android/YARA-Kids.apk
            release-assets/android/YARA-Kids.apk.sha256

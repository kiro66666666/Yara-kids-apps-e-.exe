name: Build Native Wrappers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Electron Windows Wrapper
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: desktop-wrapper
        run: npm ci

      - name: Build Windows artifacts
        working-directory: desktop-wrapper
        run: npm run build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-wrapper
          path: desktop-wrapper/dist/*.exe
          if-no-files-found: error

  build-android:
    name: Build Capacitor Android Wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile-wrapper
        run: npm ci

      - name: Generate Android platform
        working-directory: mobile-wrapper
        run: npx cap add android

      - name: Sync Capacitor Android project
        working-directory: mobile-wrapper
        run: npx cap sync android

      - name: Apply Android version metadata
        working-directory: mobile-wrapper
        run: npm run prepare:android

      - name: Apply site icon to Android launcher icons
        working-directory: mobile-wrapper
        run: npm run apply:site-icon

      - name: Build Android APK
        working-directory: mobile-wrapper/android
        run: ./gradlew assembleDebug

      - name: Rename Android APK for release
        run: |
          mkdir -p release-assets/android
          cp mobile-wrapper/android/app/build/outputs/apk/debug/app-debug.apk "release-assets/android/YARA-Kids.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper
          path: release-assets/android/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import json
          with open('desktop-wrapper/package.json', 'r', encoding='utf-8') as fh:
              print(json.load(fh)['version'])
          PY
          )
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-wrapper
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-wrapper
          path: release-assets/android

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: native-wrapper-build-${{ github.run_number }}
          name: YARA Kids Native Wrappers v${{ steps.version.outputs.value }} (build ${{ github.run_number }})
          generate_release_notes: true
          files: |
            release-assets/windows/*.exe
            release-assets/android/*.apk
